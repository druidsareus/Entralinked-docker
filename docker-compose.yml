services:
  entralinked:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=registry,ref=entralinked:latest
      cache_to:
        - type=inline
    container_name: Entralinked-docker-server
    ports:
      # DNS Server
      - "53:53/tcp"
      - "53:53/udp"
      # HTTP/HTTPS Dashboard
      - "80:80"
      - "443:443"
      # Alternative HTTP
      - "8080:8080"
      # GameSpy Server
      - "29900:29900"
    volumes:
      # Persist game data across container recreations
      - entralinked-data:/root/entralinked
    environment:
      # Optimize Java heap usage
      JAVA_OPTS: "-Xmx512m -Xms256m"
    privileged: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "systemctl", "is-active", "entralinked"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  entralinked-data:
    driver: local
